<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>งบทำการ — NiM Express</title>
<style>
  :root {
    --red:      #ED1C24;
    --red-d:    #C41010;
    --red-l:    #FEE2E2;
    --teal:     #1D9E75;
    --teal-l:   #E1F5EE;
    --purple:   #534AB7;
    --purple-l: #EEEDFE;
    --amber:    #BA7517;
    --amber-l:  #FAEEDA;
    --blue:     #185FA5;
    --blue-l:   #E6F1FB;
    --gray:     #5F5E5A;
    --gray-l:   #F1EFE8;
    --dark:     #2C2C2A;
    --border:   #E2E0D8;
    --bg:       #F8F7F4;
    --white:    #FFFFFF;
    --font:     'Noto Sans Thai', 'Sarabun', sans-serif;
    --mono:     'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--dark); font-size: 13px; }

  /* ── Topbar ── */
  .topbar {
    background: var(--red);
    color: #fff;
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.18);
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-box { width: 30px; height: 30px; background: rgba(255,255,255,.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .topbar-title { font-size: 14px; font-weight: 600; }
  .topbar-sub { font-size: 11px; opacity: .75; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,.18); color: #fff; }

  /* ── Toolbar ── */
  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky; top: 48px; z-index: 90;
  }
  .toolbar select, .toolbar input {
    height: 32px; padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--dark);
    outline: none;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: var(--red); }
  .toolbar label { font-size: 11px; color: var(--gray); }
  .btn {
    height: 32px; padding: 0 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-family: var(--font);
    color: var(--dark);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s;
  }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.primary:hover { background: var(--red-d); }
  .btn.success { background: var(--teal); color: #fff; border-color: var(--teal); }
  .ml-auto { margin-left: auto; }
  .save-status { font-size: 11px; color: var(--gray); }
  .save-status.saving { color: var(--amber); }
  .save-status.saved  { color: var(--teal); }
  .save-status.error  { color: var(--red); }

  /* ── KPI Cards ── */
  .kpi-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px 16px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }
  .kpi { background: var(--bg); border-radius: 8px; padding: 10px 14px; }
  .kpi-label { font-size: 10px; color: var(--gray); margin-bottom: 3px; }
  .kpi-val { font-size: 18px; font-weight: 600; font-family: var(--mono); color: var(--dark); }
  .kpi-val.red  { color: var(--red); }
  .kpi-val.teal { color: var(--teal); }

  /* ── Table ── */
  .table-wrap {
    padding: 10px 16px 40px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 900px;
  }
  thead th {
    background: var(--dark);
    color: #fff;
    padding: 7px 8px;
    text-align: center;
    font-weight: 500;
    font-size: 11px;
    white-space: nowrap;
    position: sticky; top: 116px;
    z-index: 80;
  }
  thead th.left { text-align: left; }
  thead th.th-sum { background: var(--amber); }

  /* group header */
  tr.grp-row td {
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .03em;
  }
  tr.grp-รายได้       td { background: var(--teal-l);   color: var(--teal); }
  tr.grp-ต้นทุนขนย้าย  td { background: var(--purple-l); color: var(--purple); }
  tr.grp-ต้นทุนกระจาย  td { background: var(--blue-l);   color: var(--blue); }
  tr.grp-ต้นทุนเข้ารับ  td { background: var(--amber-l);  color: var(--amber); }
  tr.grp-ต้นทุนแรงงาน  td { background: var(--red-l);    color: var(--red-d); }
  tr.grp-ต้นทุนบริการอื่น td { background: var(--gray-l);  color: var(--gray); }
  tr.grp-ค่าเสื่อมราคา td { background: var(--gray-l);   color: var(--gray); }
  tr.grp-ต้นทุนทางการเงิน td { background: var(--gray-l); color: var(--gray); }
  tr.grp-หัก         td { background: var(--blue-l);    color: var(--blue); }

  /* data row */
  tr.data-row td {
    padding: 4px 8px;
    border-bottom: 1px solid #F0EEE8;
    vertical-align: middle;
  }
  tr.data-row:hover td { background: #FAFAF8; }
  tr.data-row.income-row td { background: #F7FEFC; }
  tr.data-row.income-row:hover td { background: #EEF9F5; }

  .td-code { font-family: var(--mono); font-size: 10px; color: #888; white-space: nowrap; }
  .td-name { min-width: 200px; }
  .td-type { text-align: center; }
  .badge-fixed    { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: var(--blue-l); color: var(--blue); }
  .badge-variable { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: var(--amber-l); color: var(--amber); }
  .badge-income   { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: var(--teal-l); color: var(--teal); }

  .td-sum {
    text-align: right; font-family: var(--mono); font-size: 11px;
    font-weight: 600; color: var(--amber); background: #FEFAEF;
    white-space: nowrap; min-width: 90px; padding-right: 10px;
  }

  /* input cell */
  .inp {
    width: 80px; height: 26px;
    text-align: right;
    padding: 0 6px;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    background: transparent;
    color: var(--dark);
    transition: border-color .12s, background .12s;
    outline: none;
  }
  .inp:hover { border-color: var(--border); background: var(--white); }
  .inp:focus { border-color: var(--red); background: var(--white); box-shadow: 0 0 0 2px rgba(237,28,36,.1); }
  .inp.has-val { color: var(--dark); font-weight: 500; }
  .inp.changed { background: #FFF9E6; border-color: var(--amber); }

  /* loading / empty */
  .loading { text-align: center; padding: 60px; color: var(--gray); font-size: 13px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 12px; z-index: 999;
    opacity: 0; transition: opacity .25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.ok  { background: var(--teal); }
  #toast.err { background: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-box">NiM</div>
    <div>
      <div class="topbar-title">งบทำการ — NiM Express</div>
      <div class="topbar-sub">Budget Planning System 2569</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="chip" id="chip-role">Planner</span>
    <span class="chip" id="chip-user">—</span>
  </div>
</div>

<div class="toolbar">
  <label>สาขา</label>
  <select id="sel-branch" onchange="loadBudget()">
    <option value="">— กำลังโหลด —</option>
  </select>
  <label>ปีงบประมาณ</label>
  <select id="sel-year" onchange="loadBudget()">
    <option value="2569">2569</option>
    <option value="2570">2570</option>
  </select>
  <label>ค้นหา</label>
  <input type="text" id="search" placeholder="ชื่อบัญชี / Account Code..." oninput="filterTable()" style="width:200px">
  <span class="save-status" id="save-status"></span>
  <div class="ml-auto" style="display:flex;gap:8px">
    <button class="btn" onclick="resetChanges()">↩ ยกเลิก</button>
    <button class="btn success" onclick="saveAll()">💾 บันทึกทั้งหมด</button>
  </div>
</div>

<div class="kpi-bar">
  <div class="kpi">
    <div class="kpi-label">รายได้รวม (บาท)</div>
    <div class="kpi-val teal" id="kpi-income">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">ต้นทุนรวม (บาท)</div>
    <div class="kpi-val red" id="kpi-cost">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">กำไร / ขาดทุน</div>
    <div class="kpi-val" id="kpi-profit">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Account ที่กรอกแล้ว</div>
    <div class="kpi-val" id="kpi-filled">—</div>
  </div>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">
    <span class="spinner"></span> กำลังโหลดข้อมูล...
  </div>
  <table id="budget-table" style="display:none">
    <thead>
      <tr>
        <th class="left" style="width:100px">Account Code</th>
        <th class="left" style="min-width:200px">ชื่อบัญชี</th>
        <th style="width:72px">ประเภท</th>
        <th class="th-sum" style="width:100px">รวมทั้งปี</th>
        <th style="width:82px">ม.ค.</th>
        <th style="width:82px">ก.พ.</th>
        <th style="width:82px">มี.ค.</th>
        <th style="width:82px">เม.ย.</th>
        <th style="width:82px">พ.ค.</th>
        <th style="width:82px">มิ.ย.</th>
        <th style="width:82px">ก.ค.</th>
        <th style="width:82px">ส.ค.</th>
        <th style="width:82px">ก.ย.</th>
        <th style="width:82px">ต.ค.</th>
        <th style="width:82px">พ.ย.</th>
        <th style="width:82px">ธ.ค.</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyt0ntMBPQw3VSurgQHQc0ob6UYEp4LmdIyL_HHjxPSG3J-DrMC-hv3TfAdJhuqsVJ/exec';

let accounts = [];    // from MASTER_ACCOUNTS
let budgetData = {};  // acc_code → {months:{1..12}, status}
let pendingChanges = {}; // acc_code+month → amount (unsaved)
let currentBranch = '';
let currentYear   = 2569;

// ── Init ────────────────────────────────────────────────────
window.onload = async () => {
  await Promise.all([loadBranches(), loadAccounts()]);
  if (document.getElementById('sel-branch').options.length > 1) {
    loadBudget();
  }
};

// ── fetch helper (JSONP fallback for CORS) ──────────────────
function gasGet(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const url = GAS_URL + '?' + new URLSearchParams({...params, callback: cb});
    const s = document.createElement('script');
    // GAS doesn't support JSONP natively — use fetch with no-cors workaround
    // Actually use fetch directly (GAS Web App allows CORS with anyone)
    fetch(GAS_URL + '?' + new URLSearchParams(params))
      .then(r => r.json())
      .then(resolve)
      .catch(reject);
  });
}

// ── Load branches ───────────────────────────────────────────
async function loadBranches() {
  try {
    const res = await gasGet({ action: 'getBranches' });
    const sel = document.getElementById('sel-branch');
    sel.innerHTML = '';
    (res.branches || []).forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.branch_name;
      opt.textContent = b.branch_name + (b.region ? '  (' + b.region + ')' : '');
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error('loadBranches', e);
  }
}

// ── Load accounts ────────────────────────────────────────────
async function loadAccounts() {
  try {
    const res = await gasGet({ action: 'getAccounts' });
    accounts = res.accounts || [];
  } catch(e) {
    console.error('loadAccounts', e);
  }
}

// ── Load budget ──────────────────────────────────────────────
async function loadBudget() {
  currentBranch = document.getElementById('sel-branch').value;
  currentYear   = Number(document.getElementById('sel-year').value);
  pendingChanges = {};
  setStatus('');

  document.getElementById('loading').style.display = 'block';
  document.getElementById('budget-table').style.display = 'none';

  try {
    const res = await gasGet({ action: 'getBudget', branch: currentBranch, year: currentYear });
    budgetData = res.data || {};
    renderTable();
    updateKPI();
  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ โหลดข้อมูลไม่ได้ กรุณาลองใหม่';
    console.error(e);
  }
}

// ── Render table ─────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let lastGrp = null;

  accounts.forEach(acc => {
    // Group separator
    if (acc.grp_type !== lastGrp) {
      lastGrp = acc.grp_type;
      const tr = document.createElement('tr');
      tr.className = 'grp-row grp-' + acc.grp_type;
      tr.dataset.grp = acc.grp_type;
      tr.innerHTML = `<td colspan="16">▸  ${acc.group_name}</td>`;
      tbody.appendChild(tr);
    }

    const bd   = budgetData[acc.acc_code] || {};
    const mons = bd.months || {};
    const isIncome = acc.cost_type === 'รายได้';

    const tr = document.createElement('tr');
    tr.className = 'data-row' + (isIncome ? ' income-row' : '');
    tr.dataset.code = acc.acc_code;
    tr.dataset.name = acc.acc_name;
    tr.dataset.grp  = acc.grp_type;

    let badgeClass = 'badge-fixed';
    if (acc.cost_type === 'Variable') badgeClass = 'badge-variable';
    if (isIncome) badgeClass = 'badge-income';

    let rowHTML = `
      <td class="td-code">${acc.acc_code}</td>
      <td class="td-name">${acc.acc_name}</td>
      <td class="td-type"><span class="${badgeClass}">${acc.cost_type}</span></td>
      <td class="td-sum" id="sum-${acc.acc_code}">-</td>`;

    for (let m = 1; m <= 12; m++) {
      const val = mons[m] || 0;
      const hasVal = val > 0;
      rowHTML += `<td style="padding:3px 4px;text-align:right">
        <input type="number" min="0" step="1"
          class="inp${hasVal ? ' has-val' : ''}"
          id="inp-${acc.acc_code}-${m}"
          value="${hasVal ? val : ''}"
          placeholder="0"
          data-code="${acc.acc_code}"
          data-month="${m}"
          data-orig="${val}"
          onchange="onCellChange(this)"
          onfocus="this.select()">
      </td>`;
    }
    tr.innerHTML = rowHTML;
    tbody.appendChild(tr);
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('budget-table').style.display = '';
  updateAllRowSums();
}

// ── Cell change ──────────────────────────────────────────────
function onCellChange(inp) {
  const code  = inp.dataset.code;
  const month = Number(inp.dataset.month);
  const orig  = Number(inp.dataset.orig) || 0;
  const val   = Number(inp.value) || 0;
  const key   = code + '_' + month;

  if (val !== orig) {
    pendingChanges[key] = { acc_code: code, month, amount: val };
    inp.classList.add('changed');
  } else {
    delete pendingChanges[key];
    inp.classList.remove('changed');
  }
  inp.classList.toggle('has-val', val > 0);
  updateRowSum(code);
  updateKPI();
  setStatus(Object.keys(pendingChanges).length > 0 ? '● มีการเปลี่ยนแปลงที่ยังไม่บันทึก' : '');
}

// ── Row sum ──────────────────────────────────────────────────
function updateRowSum(code) {
  let total = 0;
  for (let m = 1; m <= 12; m++) {
    const inp = document.getElementById(`inp-${code}-${m}`);
    if (inp) total += Number(inp.value) || 0;
  }
  const cell = document.getElementById(`sum-${code}`);
  if (cell) cell.textContent = total > 0 ? fmt(total) : '-';
}

function updateAllRowSums() {
  accounts.forEach(a => updateRowSum(a.acc_code));
}

// ── KPI ──────────────────────────────────────────────────────
function updateKPI() {
  let income = 0, cost = 0, filled = 0;
  accounts.forEach(acc => {
    let rowTotal = 0;
    for (let m = 1; m <= 12; m++) {
      const inp = document.getElementById(`inp-${acc.acc_code}-${m}`);
      const v = inp ? (Number(inp.value) || 0) : 0;
      rowTotal += v;
    }
    if (acc.cost_type === 'รายได้') income += rowTotal;
    else cost += rowTotal;
    if (rowTotal > 0) filled++;
  });
  const profit = income - cost;
  document.getElementById('kpi-income').textContent  = fmt(income);
  document.getElementById('kpi-cost').textContent    = fmt(cost);
  const kpiP = document.getElementById('kpi-profit');
  kpiP.textContent = fmt(profit);
  kpiP.className = 'kpi-val ' + (profit >= 0 ? 'teal' : 'red');
  document.getElementById('kpi-filled').textContent  = filled + ' / ' + accounts.length;
}

// ── Save all ─────────────────────────────────────────────────
async function saveAll() {
  const items = Object.values(pendingChanges);
  if (!items.length) { toast('ไม่มีการเปลี่ยนแปลง', 'ok'); return; }
  if (!currentBranch) { toast('กรุณาเลือกสาขาก่อน', 'err'); return; }

  setStatus('saving', '⏳ กำลังบันทึก...');
  try {
    const res = await gasGet({
      action: 'saveAll',
      branch: currentBranch,
      year:   currentYear,
      email:  'user@nimexpress.co.th',
      data:   JSON.stringify(items)
    });
    if (res.success) {
      // Mark all as saved
      items.forEach(item => {
        const inp = document.getElementById(`inp-${item.acc_code}-${item.month}`);
        if (inp) {
          inp.dataset.orig = item.amount;
          inp.classList.remove('changed');
        }
      });
      pendingChanges = {};
      setStatus('saved', '✓ บันทึกแล้ว');
      toast(`บันทึกสำเร็จ ${res.updated || 0} แก้ไข, ${res.inserted || 0} ใหม่`, 'ok');
      updateKPI();
    } else {
      setStatus('error', '✗ บันทึกไม่สำเร็จ');
      toast('เกิดข้อผิดพลาด: ' + (res.error || 'unknown'), 'err');
    }
  } catch(e) {
    setStatus('error', '✗ เชื่อมต่อไม่ได้');
    toast('เชื่อมต่อ GAS ไม่ได้', 'err');
  }
}

// ── Reset changes ────────────────────────────────────────────
function resetChanges() {
  if (!Object.keys(pendingChanges).length) return;
  if (!confirm('ยกเลิกการเปลี่ยนแปลงทั้งหมดหรือไม่?')) return;
  Object.values(pendingChanges).forEach(item => {
    const inp = document.getElementById(`inp-${item.acc_code}-${item.month}`);
    if (inp) {
      inp.value = inp.dataset.orig || '';
      inp.classList.remove('changed');
      inp.classList.toggle('has-val', Number(inp.dataset.orig) > 0);
    }
  });
  pendingChanges = {};
  setStatus('');
  updateAllRowSums();
  updateKPI();
  toast('ยกเลิกการเปลี่ยนแปลงแล้ว');
}

// ── Filter ───────────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#tbody tr.data-row').forEach(tr => {
    const match = !q || tr.dataset.code.includes(q) || tr.dataset.name.includes(q);
    tr.style.display = match ? '' : 'none';
  });
  // hide group rows if all their data rows are hidden
  let lastGrpRow = null;
  document.querySelectorAll('#tbody tr').forEach(tr => {
    if (tr.classList.contains('grp-row')) {
      lastGrpRow = tr;
    } else if (tr.classList.contains('data-row') && lastGrpRow) {
      if (tr.style.display !== 'none') lastGrpRow.style.display = '';
    }
  });
  if (q) {
    document.querySelectorAll('#tbody tr.grp-row').forEach(tr => {
      const next = tr.nextElementSibling;
      if (!next || next.classList.contains('grp-row')) tr.style.display = 'none';
    });
  }
}

// ── Helpers ──────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '-';
  return Math.round(n).toLocaleString('th-TH');
}

function setStatus(type, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + (type || '');
  el.textContent = msg || '';
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}
</script>
</body>
</html>
